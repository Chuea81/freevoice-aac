name: Security Audit

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  push:
    paths:
      - 'package.json'
      - 'package-lock.json'

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run security audit (production deps, allowlist known transitive)
        # Fails on any NEW high/critical vuln, but tolerates two unavoidable
        # transitive advisories that have no upstream fix yet and are outside the
        # web app's runtime:
        #   - protobufjs  → pinned deep inside onnxruntime (Kokoro TTS, which
        #                   only runs in the native app, never on the web build)
        #   - @xmldom/xmldom → pulled in by @capacitor/cli (Android build tooling)
        # Revisit when onnxruntime / @capacitor/cli release patched versions.
        run: |
          npm audit --omit=dev --json > audit.json || true
          node -e '
            const a = require("./audit.json");
            const ALLOW = new Set(["protobufjs", "@xmldom/xmldom"]);
            const bad = [];
            for (const [name, v] of Object.entries(a.vulnerabilities || {})) {
              if ((v.severity === "high" || v.severity === "critical") && !ALLOW.has(name)) {
                bad.push(name + " (" + v.severity + ")");
              }
            }
            if (bad.length) {
              console.error("New high/critical vulnerabilities (not allowlisted):");
              bad.forEach(b => console.error("  - " + b));
              process.exit(1);
            }
            console.log("OK: no new high/critical vulns. Allowlisted transitive: " + [...ALLOW].join(", "));
          '
      - name: Check ARASAAC license compliance
        run: |
          echo "Checking for prohibited symbol sources..."
          if npm ls | grep -iE "pcs|symbolstix|widgit|mayer-johnson"; then
            echo "ERROR: Prohibited symbol library detected in dependencies"
            exit 1
          fi
          echo "✅ No prohibited symbol sources detected"
