<style>
  :root {
    --bg: #FFFFFF;
    --card-bg: #FFFFFF;
    --border: rgba(0,0,0,0.12);
    --muted: rgba(0,0,0,0.50);
    --soft: #F5F7F5;
    --text: rgba(0,0,0,0.87);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 40px 24px 80px;
  }
  header { max-width: 1200px; margin: 0 auto 28px; }
  h1 { font-size: 28px; font-weight: 900; margin: 0 0 6px; }
  .sub { color: var(--muted); font-size: 14px; margin: 0; }
  .grid {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 20px 22px;
  }
  .card h2 { font-size: 16px; font-weight: 800; margin: 0 0 2px; }
  .card .meta {
    font-size: 11px;
    color: var(--muted);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    margin-bottom: 16px;
  }
  .row {
    display: flex;
    align-items: flex-end;
    gap: 20px;
    flex-wrap: wrap;
  }
  .slot { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .slot svg { background: var(--soft); border-radius: 12px; display: block; }
  .slot .size-label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 0.5px;
  }
</style>

        g.appendChild(gg);
        break;
      }
      case 'bow': {
        const gg = svg('g', { stroke:OUTLINE, 'stroke-width':'1', 'stroke-linejoin':'round' });
        gg.appendChild(svg('path', { d:'M48 22 L62 30 L62 40 L48 48 Z', fill:ac || '#EC407A' }));
        gg.appendChild(svg('path', { d:'M80 22 L66 30 L66 40 L80 48 Z', fill:ac || '#EC407A' }));
        gg.appendChild(svg('rect', { x:'60', y:'28', width:'8', height:'14', rx:'2', fill:ac || '#EC407A' }));
        gg.appendChild(svg('path', { d:'M52 28 Q56 32 60 34', stroke:'#FFFFFF', 'stroke-width':'1.2', fill:'none', opacity:'0.5' }));
        gg.appendChild(svg('path', { d:'M76 28 Q72 32 68 34', stroke:'#FFFFFF', 'stroke-width':'1.2', fill:'none', opacity:'0.5' }));
        g.appendChild(gg);
        break;
      }
      case 'cap': {
        const gg = svg('g', { stroke:OUTLINE, 'stroke-width':'1.4', 'stroke-linejoin':'round' });
        gg.appendChild(svg('path', { d:'M34 34 Q34 12 64 12 Q94 12 94 34 L94 38 L34 38 Z', fill:ac || '#E53935' }));
        gg.appendChild(svg('path', { d:'M34 38 L16 46 Q14 42 18 38 L34 36 Z', fill:ac || '#E53935' }));
        gg.appendChild(svg('circle', { cx:'64', cy:'14', r:'3', fill:s.hair }));
        gg.appendChild(svg('rect', { x:'34', y:'36', width:'60', height:'3', fill:'#FFFFFF', opacity:'0.3', stroke:'none' }));
        g.appendChild(gg);
        break;
      }
      case 'beanie': {
        const gg = svg('g', { stroke:OUTLINE, 'stroke-width':'1.4', 'stroke-linejoin':'round' });
        gg.appendChild(svg('path', { d:'M30 40 Q30 10 64 10 Q98 10 98 40 Z', fill:ac || '#43A047' }));
        gg.appendChild(svg('rect', { x:'30', y:'38', width:'68', height:'10', rx:'2', fill:ac || '#43A047' }));
        gg.appendChild(svg('circle', { cx:'64', cy:'8', r:'4', fill:ac || '#43A047' }));
        gg.appendChild(svg('rect', { x:'30', y:'42', width:'68', height:'2', fill:'#FFFFFF', opacity:'0.35', stroke:'none' }));
        gg.appendChild(svg('path', { d:'M40 20 L40 38 M56 16 L56 38 M72 16 L72 38 M88 20 L88 38', stroke:OUTLINE, 'stroke-width':'0.8', fill:'none', opacity:'0.15' }));
        g.appendChild(gg);
        break;
      }
      case 'headband':
        g.appendChild(svg('rect', { x:'30', y:'42', width:'68', height:'6', rx:'3', fill:ac || '#43A047', stroke:OUTLINE, 'stroke-width':'1.2' }));
        g.appendChild(svg('rect', { x:'30', y:'44', width:'68', height:'1.5', fill:'#FFFFFF', opacity:'0.4' }));
        break;
      case 'earrings': {
        const gg = svg('g', { fill:'#FFB74D', stroke:OUTLINE, 'stroke-width':'0.8' });
        gg.appendChild(svg('circle', { cx:'36', cy:'68', r:'2.5' }));
        gg.appendChild(svg('circle', { cx:'92', cy:'68', r:'2.5' }));
        gg.appendChild(svg('circle', { cx:'35.5', cy:'67.5', r:'0.8', fill:'#FFFFFF', stroke:'none' }));
        gg.appendChild(svg('circle', { cx:'91.5', cy:'67.5', r:'0.8', fill:'#FFFFFF', stroke:'none' }));
        g.appendChild(gg);
        break;
      }
      case 'freckles': {
        const gg = svg('g', { fill:'#8B5A2B', opacity:'0.7' });
        gg.appendChild(svg('circle', { cx:'48', cy:'66', r:'1.1' }));
        gg.appendChild(svg('circle', { cx:'52', cy:'69', r:'1.1' }));
        gg.appendChild(svg('circle', { cx:'76', cy:'69', r:'1.1' }));
        gg.appendChild(svg('circle', { cx:'80', cy:'66', r:'1.1' }));
        gg.appendChild(svg('circle', { cx:'54', cy:'72', r:'0.8' }));
        gg.appendChild(svg('circle', { cx:'74', cy:'72', r:'0.8' }));
        gg.appendChild(svg('circle', { cx:'46', cy:'70', r:'0.7' }));
        gg.appendChild(svg('circle', { cx:'82', cy:'70', r:'0.7' }));
        g.appendChild(gg);
        break;
      }
    }
    return g;
  }

  function mouthShape(type) {
    const g = svg('g', {});
    switch (type) {
      case 'closed':
        g.appendChild(svg('path', { d:'M56 75 Q64 80 72 75', stroke:OUTLINE, 'stroke-width':'1.8', fill:'none', 'stroke-linecap':'round' }));
        break;
      case 'open':
        g.appendChild(svg('path', { d:'M57 74 Q64 82 71 74 Q64 80 57 74 Z', fill:'#A94040', stroke:OUTLINE, 'stroke-width':'1.4', 'stroke-linejoin':'round' }));
        g.appendChild(svg('path', { d:'M58 75 L70 75 L69 76.5 Q64 78 59 76.5 Z', fill:'#FFFFFF' }));
        break;
      case 'grin':
        g.appendChild(svg('path', { d:'M54 74 Q64 84 74 74 Q64 82 54 74 Z', fill:'#A94040', stroke:OUTLINE, 'stroke-width':'1.6', 'stroke-linejoin':'round' }));
        g.appendChild(svg('path', { d:'M56 75 L72 75 L71 77 Q64 79 57 77 Z', fill:'#FFFFFF' }));
        g.appendChild(svg('line', { x1:'64', y1:'75', x2:'64', y2:'77', stroke:OUTLINE, 'stroke-width':'0.6', opacity:'0.3' }));
        break;
    }
    return g;
  }

  function avatarSVG(id, size) {
    const s = STYLES[id];
    const hatCovers = s.accessory === 'cap' || s.accessory === 'beanie';
    const root = svg('svg', {
      viewBox: '0 0 128 128',
      width: String(size),
      height: String(size),
      xmlns: 'http://www.w3.org/2000/svg',
    });

    // Shirt
    root.appendChild(svg('path', { d:'M6 128 Q10 96 44 92 Q50 104 64 104 Q78 104 84 92 Q118 96 122 128 Z', fill:s.shirt, stroke:OUTLINE, 'stroke-width':'1.5', 'stroke-linejoin':'round' }));
    root.appendChild(svg('path', { d:'M44 92 Q50 104 64 104 Q78 104 84 92', stroke:OUTLINE, 'stroke-width':'1.2', fill:'none', opacity:'0.25' }));

    // Neck
    root.appendChild(svg('path', { d:'M56 82 L56 96 Q56 100 64 100 Q72 100 72 96 L72 82 Z', fill:s.skin, stroke:OUTLINE, 'stroke-width':'1.2', 'stroke-linejoin':'round' }));
    root.appendChild(svg('path', { d:'M56 92 Q64 95 72 92', stroke:s.skinShadow, 'stroke-width':'1.4', fill:'none', opacity:'0.5' }));

    // Back hair
    root.appendChild(backHair(s));

    // Ears
    root.appendChild(svg('ellipse', { cx:'37', cy:'62', rx:'3.5', ry:'5', fill:s.skin, stroke:OUTLINE, 'stroke-width':'1.2' }));
    root.appendChild(svg('ellipse', { cx:'91', cy:'62', rx:'3.5', ry:'5', fill:s.skin, stroke:OUTLINE, 'stroke-width':'1.2' }));
    root.appendChild(svg('path', { d:'M37 61 Q38.5 62 37 64', stroke:s.skinShadow, 'stroke-width':'1', fill:'none', opacity:'0.6' }));
    root.appendChild(svg('path', { d:'M91 61 Q89.5 62 91 64', stroke:s.skinShadow, 'stroke-width':'1', fill:'none', opacity:'0.6' }));

    // Head
    root.appendChild(svg('ellipse', { cx:'64', cy:'58', rx:'26', ry:'27', fill:s.skin, stroke:OUTLINE, 'stroke-width':'1.5' }));
    root.appendChild(svg('path', { d:'M46 76 Q64 92 82 76', stroke:s.skinShadow, 'stroke-width':'1.4', fill:'none', opacity:'0.4' }));

    // Blush
    root.appendChild(svg('ellipse', { cx:'46', cy:'68', rx:'4.5', ry:'3', fill:s.blush, opacity:'0.5' }));
    root.appendChild(svg('ellipse', { cx:'82', cy:'68', rx:'4.5', ry:'3', fill:s.blush, opacity:'0.5' }));

    // Eyebrows
    root.appendChild(svg('path', { d:'M46 52 Q53 49 60 52', stroke:OUTLINE, 'stroke-width':'2', fill:'none', 'stroke-linecap':'round' }));
    root.appendChild(svg('path', { d:'M68 52 Q75 49 82 52', stroke:OUTLINE, 'stroke-width':'2', fill:'none', 'stroke-linecap':'round' }));

    // Eye whites
    root.appendChild(svg('ellipse', { cx:'53', cy:'61', rx:'4', ry:'4.5', fill:'#FFFFFF', stroke:OUTLINE, 'stroke-width':'1' }));
    root.appendChild(svg('ellipse', { cx:'75', cy:'61', rx:'4', ry:'4.5', fill:'#FFFFFF', stroke:OUTLINE, 'stroke-width':'1' }));
    // Pupils
    root.appendChild(svg('ellipse', { cx:'53', cy:'62', rx:'2.5', ry:'3', fill:OUTLINE }));
    root.appendChild(svg('ellipse', { cx:'75', cy:'62', rx:'2.5', ry:'3', fill:OUTLINE }));
    // Highlights
    root.appendChild(svg('circle', { cx:'54.2', cy:'60.5', r:'1', fill:'#FFFFFF' }));
    root.appendChild(svg('circle', { cx:'76.2', cy:'60.5', r:'1', fill:'#FFFFFF' }));

    // Nose
    root.appendChild(svg('path', { d:'M62 68 Q64 71 66 68', stroke:OUTLINE, 'stroke-width':'1.4', fill:'none', 'stroke-linecap':'round' }));

    // Mouth
    root.appendChild(mouthShape(s.mouth));

    // Front hair
    if (!hatCovers) root.appendChild(frontHair(s));

    // Accessory
    root.appendChild(accessoryLayer(s));

    return root;
  }

  const grid = document.getElementById('grid');
  for (const [id, s] of Object.entries(STYLES)) {
    const card = document.createElement('div');
    card.className = 'card';

    const h2 = document.createElement('h2');
    h2.textContent = `${s.name} — ${id}`;
    card.appendChild(h2);

    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = `${s.hairStyle} · ${s.accessory || 'no accessory'} · ${s.mouth}`;
    card.appendChild(meta);

    const row = document.createElement('div');
    row.className = 'row';

    for (const size of [40, 80, 120]) {
      const slot = document.createElement('div');
      slot.className = 'slot';
      slot.appendChild(avatarSVG(id, size));
      const label = document.createElement('span');
      label.className = 'size-label';
      label.textContent = `${size}px`;
      slot.appendChild(label);
      row.appendChild(slot);
    }
    card.appendChild(row);
    grid.appendChild(card);
  }
</script>
</body>
</html>
